<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Peaches Hub 🍑</title>
<style>
  :root{
    --peach-1:#ff8fb1;
    --peach-2:#EF0870;
    --peach-dark:#3d1f2a;
    --bg:#1a1020;
    --card-bg:#2a1830;
    --card-bg-2:#33203a;
    --text:#fbeaf2;
    --text-dim:#c9a8bb;
    --green:#2ecc71;
    --yellow:#f1c40f;
    --red:#e74c3c;
    --gold:#ffd700;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(160deg,var(--bg),#241228 60%,#170b1c);
    color:var(--text);
    min-height:100vh;
  }
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;}
  img{max-width:100%;display:block;}

  /* ===== HEADER ===== */
  header{
    position:sticky;top:0;z-index:50;
    background:rgba(26,16,32,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(239,8,112,0.25);
  }
  .header-inner{
    max-width:640px;margin:0 auto;padding:14px 18px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .header-left{display:flex;align-items:center;gap:12px;}
  #hamburgerBtn{
    background:none;font-size:26px;color:var(--peach-1);padding:4px 8px;border-radius:8px;
  }
  #hamburgerBtn:hover{background:rgba(239,8,112,0.15);}
  .logo{font-weight:800;font-size:19px;letter-spacing:0.5px;
    background:linear-gradient(90deg,var(--peach-2),#ffffff);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .tabs{display:flex;gap:6px;background:var(--card-bg);padding:4px;border-radius:999px;}
  .tab-btn{
    padding:8px 16px;border-radius:999px;background:none;color:var(--text-dim);font-weight:600;font-size:14px;
  }
  .tab-btn.active{background:linear-gradient(90deg,var(--peach-2),var(--peach-1));color:#fff;}

  /* ===== DRAWER ===== */
  #drawerOverlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;
    display:none;
  }
  #drawer{
    position:fixed;top:0;left:0;height:100%;width:280px;max-width:82vw;
    background:var(--card-bg);z-index:100;
    transform:translateX(-100%);transition:transform .25s ease;
    display:flex;flex-direction:column;padding:20px 16px;gap:18px;
    box-shadow:4px 0 20px rgba(0,0,0,0.4);
  }
  #drawer.open{transform:translateX(0);}
  .drawer-title{font-weight:800;font-size:18px;color:var(--peach-2);margin-bottom:4px;}
  .social-row{display:flex;flex-direction:column;gap:10px;}
  .social-link{
    display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;
    background:var(--card-bg-2);transition:background .15s;
  }
  .social-link:hover{background:rgba(239,8,112,0.18);}
  .social-link img{width:28px;height:28px;object-fit:contain;border-radius:6px;}
  .social-link span{font-weight:600;font-size:14px;}
  .drawer-divider{height:1px;background:rgba(255,255,255,0.08);}
  .drawer-nav-btn{
    display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;
    background:var(--card-bg-2);font-weight:700;font-size:15px;color:var(--text);
    justify-content:flex-start;
  }
  .drawer-nav-btn:hover{background:rgba(239,8,112,0.18);}
  #staffDrawerBtn{margin-top:auto;background:linear-gradient(90deg,#6a3d8f,#a45fc7);color:#fff;}

  /* ===== MAIN ===== */
  main{max-width:640px;margin:0 auto;padding:16px 12px 60px;}
  .hidden{display:none !important;}

  #addActBtn{
    display:block;width:100%;margin-bottom:16px;padding:12px;border-radius:14px;
    background:linear-gradient(90deg,var(--peach-2),var(--gold));color:#fff;font-weight:800;font-size:15px;
  }

  /* ===== ACTIVITY CARD ===== */
  .card{
    background:var(--card-bg);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;
    border:1px solid rgba(255,255,255,0.06);
  }
  .card.anuario-card{border:1px solid var(--gold);box-shadow:0 0 18px rgba(255,215,0,0.15);}
  .card-top{display:flex;gap:0;padding:14px;}
  @media (max-width:480px){.card-top{flex-direction:column;}}
  .card-img-wrap{
    position:relative;flex:0 0 120px;width:120px;aspect-ratio:1/1;border-radius:12px;overflow:hidden;
    background:var(--card-bg-2);
  }
  @media (max-width:480px){.card-img-wrap{width:100%;flex-basis:auto;}}
  .card-img-wrap img{width:100%;height:100%;object-fit:contain;}
  .crown-badge{
    position:absolute;top:-6px;left:-6px;font-size:26px;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.6));
  }
  .card-info{flex:1;padding-left:14px;display:flex;flex-direction:column;gap:6px;min-width:0;}
  @media (max-width:480px){.card-info{padding-left:0;padding-top:10px;}}
  .card-title{font-weight:800;font-size:16px;line-height:1.25;}
  .card-dates{font-size:12.5px;color:var(--text-dim);}
  .status-tag{
    display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;width:fit-content;
  }
  .status-green{background:rgba(46,204,113,0.18);color:var(--green);}
  .status-yellow{background:rgba(241,196,15,0.18);color:var(--yellow);}
  .status-red{background:rgba(231,76,60,0.18);color:var(--red);}
  .card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .btn-small{
    padding:7px 12px;border-radius:10px;font-size:12.5px;font-weight:700;
  }
  .btn-primary{background:linear-gradient(90deg,var(--peach-2),var(--peach-1));color:#fff;}
  .btn-ghost{background:var(--card-bg-2);color:var(--text);}
  .btn-admin{background:rgba(164,95,199,0.25);color:#d9b6f5;}
  .btn-danger{background:rgba(231,76,60,0.22);color:var(--red);}

  .accordion{border-top:1px solid rgba(255,255,255,0.07);}
  .accordion-toggle{
    width:100%;text-align:left;padding:12px 16px;background:none;color:var(--peach-2);
    font-weight:700;font-size:13.5px;display:flex;justify-content:space-between;align-items:center;
  }
  .accordion-body{padding:0 16px 16px;font-size:13.5px;color:var(--text-dim);line-height:1.5;display:none;white-space:pre-wrap;}
  .accordion-body.open{display:block;}
  .wishlist-block{margin-top:10px;padding:10px;background:var(--card-bg-2);border-radius:10px;white-space:pre-wrap;}

  table.entregas-table{width:100%;border-collapse:collapse;font-size:13px;}
  table.entregas-table th{text-align:left;color:var(--peach-2);padding:6px 4px;border-bottom:1px solid rgba(255,255,255,0.1);}
  table.entregas-table td{padding:6px 4px;border-bottom:1px solid rgba(255,255,255,0.05);vertical-align:middle;}
  table.entregas-table a{color:var(--peach-1);text-decoration:underline;}
  .anuario-mini-btn{background:rgba(255,215,0,0.18);color:var(--gold);padding:5px 8px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap;}

  /* ===== ANUARIO GRID ===== */
  #anuarioGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media (max-width:420px){#anuarioGrid{grid-template-columns:1fr;}}
  .anuario-tile{
    position:relative;border-radius:14px;overflow:hidden;background:var(--card-bg);
    border:1px solid var(--gold);box-shadow:0 0 14px rgba(255,215,0,0.12);cursor:pointer;
  }
  .anuario-tile img{width:100%;aspect-ratio:1/1;object-fit:contain;background:var(--card-bg-2);}
  .anuario-tile .crown-badge{top:6px;left:6px;}
  .anuario-tile .tile-title{padding:10px;font-weight:800;font-size:13.5px;}

  /* ===== MIEMBROS ===== */
  #searchMiembros{
    width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);
    background:var(--card-bg-2);color:var(--text);font-size:14px;margin-bottom:14px;
    display:block;
  }
  .section-label{font-weight:800;color:var(--peach-2);margin:16px 0 10px;font-size:14px;text-align:left;}
  #staffCarousel{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;}
  .member-avatar-item{flex:0 0 auto;width:78px;text-align:center;cursor:pointer;}
  .member-avatar-item img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--peach-2);margin:0 auto;}
  .member-avatar-item .m-name{font-size:11px;margin-top:6px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  #miembrosList{display:flex;flex-direction:column;gap:10px;}
  .member-row{
    display:flex;align-items:center;gap:12px;background:var(--card-bg);padding:10px 12px;border-radius:14px;cursor:pointer;
  }
  .member-row img{width:46px;height:46px;border-radius:50%;object-fit:cover;}
  .member-row .m-info{flex:1;min-width:0;}
  .member-row .m-name{font-weight:700;font-size:14px;}
  .badges-row{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;}
  .badge{padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:700;}
  .badge-staff{background:rgba(164,95,199,0.25);color:#d9b6f5;}
  .badge-canto{background:rgba(46,204,113,0.2);color:var(--green);}
  .badge-doblaje{background:rgba(52,152,219,0.2);color:#5dade2;}

  /* ===== PIN / STAFF SCREEN ===== */
  .center-screen{max-width:340px;margin:60px auto;text-align:center;padding:0 16px;}
  #pinInput{
    width:100%;text-align:center;font-size:24px;letter-spacing:8px;padding:14px;border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);background:var(--card-bg-2);color:var(--text);margin:16px 0;
  }
  #pinMsg{font-size:13px;color:var(--red);min-height:18px;}
  #staffStatusBadge{
    display:none;position:fixed;bottom:14px;right:14px;background:linear-gradient(90deg,#6a3d8f,#a45fc7);
    color:#fff;padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:700;z-index:60;
    box-shadow:0 4px 14px rgba(0,0,0,0.4);cursor:pointer;
  }

  /* ===== MODALS ===== */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;
    display:none;align-items:flex-start;justify-content:center;padding:30px 12px;overflow-y:auto;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:var(--card-bg);border-radius:18px;padding:20px;width:100%;max-width:440px;
    max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .modal-box h3{margin-top:0;color:var(--peach-2);}
  .modal-close{float:right;background:none;color:var(--text-dim);font-size:20px;}
  .form-group{margin-bottom:12px;}
  .form-group label{display:block;font-size:12.5px;color:var(--text-dim);margin-bottom:5px;font-weight:600;}
  .form-group input, .form-group textarea, .form-group select{
    width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);
    background:var(--card-bg-2);color:var(--text);font-family:inherit;font-size:13.5px;
  }
  .form-group textarea{min-height:70px;resize:vertical;}
  .modal-actions{display:flex;gap:10px;margin-top:16px;}
  .modal-actions button{flex:1;padding:12px;border-radius:12px;font-weight:800;}

  .member-modal-header{text-align:center;}
  .member-modal-header img{width:90px;height:90px;border-radius:50%;object-fit:cover;margin:0 auto 10px;border:3px solid var(--peach-2);}
  .expelled-banner{background:var(--red);color:#fff;padding:8px;border-radius:10px;font-weight:800;text-align:center;margin-bottom:12px;font-size:13px;}
  .info-table{width:100%;margin-top:14px;font-size:13.5px;}
  .info-table td{padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
  .info-table td:first-child{color:var(--text-dim);width:50%;}
  .platform-row{display:flex;gap:10px;margin-top:14px;}
  .platform-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;background:var(--card-bg-2);border-radius:12px;}
  .platform-btn img{width:28px;height:28px;object-fit:contain;}
  .platform-btn span{font-size:11px;color:var(--text-dim);}
  .castigos-box{margin-top:16px;background:var(--card-bg-2);border-radius:12px;padding:12px;}
  .castigos-box .ct-title{font-weight:800;color:var(--peach-2);margin-bottom:8px;font-size:13px;}
  .castigos-box .ct-row{display:flex;justify-content:space-between;font-size:13.5px;padding:3px 0;}
  .admin-strike-btns{display:flex;gap:8px;margin-top:12px;}
  .admin-strike-btns button{flex:1;padding:10px;border-radius:10px;font-weight:700;font-size:12.5px;}
  .btn-falta{background:rgba(241,196,15,0.2);color:var(--yellow);}
  .btn-strike{background:rgba(231,76,60,0.2);color:var(--red);}
  .btn-reset-castigos{width:100%;margin-top:8px;padding:9px;border-radius:10px;font-weight:700;font-size:12.5px;background:rgba(255,255,255,0.08);color:var(--text-dim);}

  .winners-block{background:var(--card-bg-2);border-radius:12px;padding:14px;margin-top:10px;}
  .winners-block div{margin:6px 0;font-size:14px;}
  .toast{
    position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#222;color:#fff;
    padding:10px 18px;border-radius:999px;font-size:13px;z-index:300;opacity:0;transition:opacity .25s;
    text-align:center;max-width:85vw;
  }
  .toast.show{opacity:1;}
  .empty-state{text-align:center;color:var(--text-dim);padding:40px 10px;font-size:14px;}
  .upload-status{font-size:12px;color:var(--text-dim);margin-top:4px;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <button id="hamburgerBtn">☰</button>
      <div class="logo">🍑 Peaches Hub</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="actividades">Actividades</button>
      <button class="tab-btn" data-tab="anuario">Anuario</button>
    </div>
  </div>
</header>

<div id="drawerOverlay"></div>
<div id="drawer">
  <div class="drawer-title">Team Peaches</div>
  <div class="social-row">
    <a class="social-link" target="_blank" href="https://youtube.com/@teampeachesoff">
      <img src="https://pngimg.com/uploads/youtube/youtube_PNG102352.png" alt="YouTube"><span>YouTube</span>
    </a>
    <a class="social-link" target="_blank" href="https://www.instagram.com/team_peaches_off/">
      <img src="https://pngimg.com/uploads/instagram/instagram_PNG10.png" alt="Instagram"><span>Instagram</span>
    </a>
    <a class="social-link" target="_blank" href="https://www.tiktok.com/@team_peaches_off">
      <img src="https://static.vecteezy.com/system/resources/previews/016/716/450/original/tiktok-icon-free-png.png" alt="TikTok"><span>TikTok</span>
    </a>
    <a class="social-link" target="_blank" href="https://www.smule.com/groups/1934104?utm_source=web&utm_campaign=share&utm_medium=copylink">
      <img src="https://blog.smule.com/wp-content/uploads/smule-icon.png" alt="Smule"><span>Smule</span>
    </a>
  </div>
  <div class="drawer-divider"></div>
  <button class="drawer-nav-btn" id="miembrosDrawerBtn">👥 Miembros</button>
  <button class="drawer-nav-btn" id="staffDrawerBtn">🛠️ Staff</button>
</div>

<main>

  <!-- ACTIVIDADES -->
  <section id="viewActividades">
    <button id="addActBtn" class="hidden">(+) Añadir Actividad</button>
    <div id="actividadesFeed"></div>
  </section>

  <!-- ANUARIO -->
  <section id="viewAnuario" class="hidden">
    <div id="anuarioGrid"></div>
  </section>

  <!-- MIEMBROS -->
  <section id="viewMiembros" class="hidden">
    <input type="text" id="searchMiembros" placeholder="🔍 Buscar por nombre, rol o rango vocal...">
    <div class="section-label">👑 Staff & Coordinación</div>
    <div id="staffCarousel"></div>
    <div class="section-label">🍑 Miembros</div>
    <div id="miembrosList"></div>
  </section>

  <!-- STAFF PIN -->
  <section id="viewStaffPin" class="hidden">
    <div class="center-screen">
      <div style="font-size:40px;">🍑🔒</div>
      <h3>Introduce el PIN de Staff</h3>
      <input type="password" id="pinInput" maxlength="6" inputmode="numeric">
      <div id="pinMsg"></div>
      <button class="btn-primary" style="width:100%;padding:12px;border-radius:12px;font-weight:800;" id="pinSubmitBtn">Desbloquear</button>
    </div>
  </section>

</main>

<div id="staffStatusBadge">🛠️ Modo Staff activo</div>
<div class="toast" id="toast"></div>

<!-- MODAL: Detalle de miembro / anuario -->
<div class="modal-overlay" id="memberModal">
  <div class="modal-box">
    <button class="modal-close" data-close="memberModal">✕</button>
    <div id="memberModalContent"></div>
  </div>
</div>

<!-- MODAL: Detalle / edición de actividad -->
<div class="modal-overlay" id="activityFormModal">
  <div class="modal-box">
    <button class="modal-close" data-close="activityFormModal">✕</button>
    <h3 id="activityFormTitle">Nueva actividad</h3>
    <form id="activityForm">
      <input type="hidden" id="af_id">
      <div class="form-group"><label>Título</label><input type="text" id="af_titulo" required></div>
      <div class="form-group">
        <label>Imagen (URL)</label>
        <input type="text" id="af_imagenUrl">
      </div>
      <div class="form-group">
        <label>O sube una imagen desde tu galería/archivos</label>
        <input type="file" id="af_imagenFile" accept="image/*">
        <div class="upload-status" id="af_uploadStatus"></div>
      </div>
      <div class="form-group"><label>Descripción</label><textarea id="af_descripcion"></textarea></div>
      <div class="form-group"><label>Wishlist (ideas, una por línea)</label><textarea id="af_wishlist"></textarea></div>
      <div class="form-group"><label>Fecha inicio</label><input type="date" id="af_fechaInicio"></div>
      <div class="form-group"><label>Fecha fin</label><input type="date" id="af_fechaFin"></div>
      <div class="form-group"><label>Link de entrega (Forms)</label><input type="text" id="af_linkForms"></div>
      <div class="form-group">
        <label>Categoría (elige solo una)</label>
        <div style="display:flex;gap:16px;">
          <label style="display:flex;align-items:center;gap:6px;font-weight:400;"><input type="radio" name="af_categoria" value="canto" style="width:auto;"> 🎤 Canto</label>
          <label style="display:flex;align-items:center;gap:6px;font-weight:400;"><input type="radio" name="af_categoria" value="doblaje" style="width:auto;"> 🎙️ Doblaje</label>
          <label style="display:flex;align-items:center;gap:6px;font-weight:400;"><input type="radio" name="af_categoria" value="" style="width:auto;" checked> Ninguna</label>
        </div>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="af_esAnuario" style="width:auto;"> Mover al Anuario</label>
      </div>
      <div id="af_anuarioFields" class="hidden">
        <div class="form-group"><label>🥇 Mejor Canto</label><input type="text" id="af_ganadorCanto"></div>
        <div class="form-group"><label>🎙️ Mejor Doblaje</label><input type="text" id="af_ganadorDoblaje"></div>
        <div class="form-group"><label>✨ Menciones Honoríficas</label><textarea id="af_menciones"></textarea></div>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL: Registrar entrega -->
<div class="modal-overlay" id="entregaFormModal">
  <div class="modal-box">
    <button class="modal-close" data-close="entregaFormModal">✕</button>
    <h3>Registrar entrega</h3>
    <form id="entregaForm">
      <input type="hidden" id="en_idActividad">
      <div class="form-group"><label>Nombre</label><input type="text" id="en_nombre" required></div>
      <div class="form-group"><label>Canción / Escena</label><input type="text" id="en_detalle" required></div>
      <div class="form-group"><label>Enlace</label><input type="text" id="en_link"></div>
      <div class="modal-actions"><button type="submit" class="btn-primary">Guardar</button></div>
    </form>
  </div>
</div>

<script>
/* ============================================================
   CONFIGURACIÓN
   ============================================================ */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcnPM10DeRLE6ReNX_AqeViRfKkHjpflT-QCw05oW_L8n5ohrDhfR_iPuzTqYNrG8H4A/exec";
const LOGO_DEFAULT = "https://raw.githubusercontent.com/WaxyFlounder971/TeamPeachesHub/main/imagenes/PeachesLogo.jpg";

/* ============================================================
   ESTADO GLOBAL
   ============================================================ */
let DB = { actividades: [], entregas: [], miembros: [] };
let staffPin = localStorage.getItem("tph_pin") || null;
let currentTab = "actividades";

/* ============================================================
   UTILIDADES
   ============================================================ */
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

function estadoActividad(fechaFinStr){
  if(!fechaFinStr) return {clase:"status-green", texto:"🟢 Actividad Activa"};
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const fin = new Date(fechaFinStr); fin.setHours(0,0,0,0);
  const diffDias = Math.round((fin - hoy) / (1000*60*60*24));
  if(diffDias < 0) return {clase:"status-red", texto:"🔴 Actividad Finalizada"};
  if(diffDias <= 2) return {clase:"status-yellow", texto:"🟡 Últimos Días"};
  return {clase:"status-green", texto:"🟢 Actividad Activa"};
}

function fmtFecha(f){
  if(!f) return "";
  const d = new Date(f);
  if(isNaN(d)) return f;
  return d.toLocaleDateString("es-CR",{day:"2-digit",month:"short",year:"numeric"});
}

function esTrue(v){
  return v === true || v === "TRUE" || v === "true" || v === 1;
}

async function apiPost(payload){

}

/* ---- Descargar imagen al mantener presionada / click derecho ---- */
async function downloadImage(url, filename){
  try{
    const res = await fetch(url, {mode:"cors"});
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = filename || "imagen-peaches.jpg";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(blobUrl);
    toast("Imagen descargada en el dispositivo ✅");
  }catch(err){
    toast("No se pudo descargar la imagen ❌");
    console.error(err);
  }
}

function enableLongPress(img, filename){
  if(!img || img.dataset.longPressBound) return;
  img.dataset.longPressBound = "1";
  let timer = null;
  const start = () => { timer = setTimeout(()=>downloadImage(img.src, filename), 550); };
  const cancel = () => { if(timer){ clearTimeout(timer); timer = null; } };
  img.addEventListener("touchstart", start, {passive:true});
  img.addEventListener("touchend", cancel);
  img.addEventListener("touchmove", cancel);
  img.addEventListener("mousedown", start);
  img.addEventListener("mouseup", cancel);
  img.addEventListener("mouseleave", cancel);
  img.addEventListener("contextmenu", (e)=>{ e.preventDefault(); downloadImage(img.src, filename); });
}

function toDateInput(v){
  if(!v) return "";
  const d = new Date(v);
  if(isNaN(d)) return "";

}

}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

document.getElementById("af_imagenFile").addEventListener("change", async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById("af_uploadStatus");
  statusEl.textContent = "Subiendo imagen...";
  try{
    const base64Data = await fileToBase64(file);
    const r = await apiPost({action:"uploadImage", filename:file.name, mimeType:file.type, base64Data});
    if(r.ok){
      document.getElementById("af_imagenUrl").value = r.url;
      statusEl.textContent = "Imagen subida ✅";
    } else {
      statusEl.textContent = "Error: " + (r.error||"no se pudo subir");
    }
  }catch(err){
    statusEl.textContent = "Error al leer la imagen";
    console.error(err);
  }
});

  } else {
    data.id = "ACT-" + Date.now();
    r = await apiPost({action:"addActividad", data});
  }
  if(r.ok){ toast("Guardado ✅"); closeModal("activityFormModal"); await cargarDatos(); }
  else toast("Error: " + (r.error || "revisa el PIN"));
});

/* ============================================================
   FORM: Entrega
   ============================================================ */
function openEntregaForm(idActividad){
  document.getElementById("en_idActividad").value = idActividad;
  document.getElementById("en_nombre").value = "";
  document.getElementById("en_detalle").value = "";
  document.getElementById("en_link").value = "";
  openModal("entregaFormModal");
}

document.getElementById("entregaForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const data = {
    id: "ENT-" + Date.now(),
    idActividad: document.getElementById("en_idActividad").value,
    nombreUsuario: document.getElementById("en_nombre").value,
    detalleEntrega: document.getElementById("en_detalle").value,
    linkGrabacion: document.getElementById("en_link").value,
  };
  const r = await apiPost({action:"addEntrega", data});
  if(r.ok){ toast("Entrega registrada ✅"); closeModal("entregaFormModal"); await cargarDatos(); }
  else toast("Error: " + (r.error || "revisa el PIN"));
});

/* ============================================================
   NAVEGACIÓN: TABS, DRAWER, STAFF
   ============================================================ */
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.onclick = () => switchTab(btn.dataset.tab);
});
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active", b.dataset.tab===tab));
  document.getElementById("viewActividades").classList.toggle("hidden", tab!=="actividades");
  document.getElementById("viewAnuario").classList.toggle("hidden", tab!=="anuario");
  document.getElementById("viewMiembros").classList.add("hidden");
  document.getElementById("viewStaffPin").classList.add("hidden");
}

document.getElementById("hamburgerBtn").onclick = () => {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerOverlay").style.display = "block";
};
document.getElementById("drawerOverlay").onclick = closeDrawer;
function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerOverlay").style.display = "none";
}

document.getElementById("miembrosDrawerBtn").onclick = () => {
  closeDrawer();
  document.getElementById("viewActividades").classList.add("hidden");
  document.getElementById("viewAnuario").classList.add("hidden");
  document.getElementById("viewStaffPin").classList.add("hidden");
  document.getElementById("viewMiembros").classList.remove("hidden");
  renderMiembros();
};

document.getElementById("staffDrawerBtn").onclick = () => {
  closeDrawer();
  if(staffPin){
    toast("Ya estás en modo Staff 🛠️");
    return;
  }
  document.getElementById("viewActividades").classList.add("hidden");
  document.getElementById("viewAnuario").classList.add("hidden");
  document.getElementById("viewMiembros").classList.add("hidden");
  document.getElementById("viewStaffPin").classList.remove("hidden");
};

document.getElementById("searchMiembros").addEventListener("input", (e)=>{
  renderMiembros(e.target.value);
});

document.getElementById("pinSubmitBtn").onclick = verificarPin;
document.getElementById("pinInput").addEventListener("keydown", e=>{
  if(e.key === "Enter") verificarPin();
});
async function verificarPin(){
  const val = document.getElementById("pinInput").value.trim();
  if(!val){ document.getElementById("pinMsg").textContent = "Escribe un PIN."; return; }
  staffPin = val;
  const r = await apiPost({action:"validarPin"});
  if(r.ok){
    localStorage.setItem("tph_pin", val);
    document.getElementById("pinMsg").textContent = "";
    toast("Modo Staff activado 🛠️");
    document.getElementById("staffStatusBadge").style.display = "block";
    document.getElementById("addActBtn").classList.remove("hidden");
    switchTab("actividades");
    renderActividades(); renderAnuario(); renderMiembros();
  } else {
    staffPin = null;
    document.getElementById("pinMsg").textContent = "PIN incorrecto ❌";
  }
}

document.getElementById("staffStatusBadge").onclick = () => {
  if(confirm("¿Deseas salir del modo staff?")){
    staffPin = null;
    localStorage.removeItem("tph_pin");
    document.getElementById("staffStatusBadge").style.display = "none";
    document.getElementById("addActBtn").classList.add("hidden");
    toast("Saliste del modo staff");
    renderActividades(); renderAnuario(); renderMiembros();
  }
};

/* ============================================================
   ESCAPE HELPERS
   ============================================================ */
function escHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[s]));
}
function escAttr(str){ return escHtml(str); }

/* ============================================================
   INICIO
   ============================================================ */
if(staffPin){
  document.getElementById("staffStatusBadge").style.display = "block";
  document.getElementById("addActBtn").classList.remove("hidden");
}
cargarDatos();
</script>
</body>
</html>
